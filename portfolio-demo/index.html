<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BeatLingua — Demo</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(160deg, #e8ecf4 0%, #dce3f0 45%, #d4dce8 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 16px 32px;
      }

      .page {
        width: 100%;
        max-width: 1200px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 28px;
      }

      .intro {
        text-align: center;
        color: #3d4556;
      }

      .intro h1 {
        margin: 0 0 8px;
        font-size: clamp(1.25rem, 3vw, 1.75rem);
        font-weight: 600;
        letter-spacing: -0.02em;
        color: #1a1f2e;
      }

      .intro p {
        margin: 0;
        font-size: 0.95rem;
        line-height: 1.5;
        opacity: 0.85;
        max-width: 36ch;
      }

      /*
        iPhone-like frame: 375×800. Scales down when the viewport is too narrow or short
        using width + aspect-ratio (no transform), so layout stays centered without overflow.
      */
      .phone-stage {
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        width: min(
          375px,
          calc(100vw - 32px),
          calc((100vh - 180px) * 375 / 800)
        );
        aspect-ratio: 375 / 800;
        max-width: 375px;
      }

      .phone {
        flex: 1;
        min-height: 0;
        width: 100%;
        background: #0a0a0a;
        border: 3px solid #000;
        border-radius: 44px;
        padding: 12px;
        box-shadow:
          0 4px 6px rgba(15, 23, 42, 0.06),
          0 22px 48px rgba(15, 23, 42, 0.18),
          0 0 0 1px rgba(0, 0, 0, 0.35) inset;
      }

      .phone__screen {
        width: 100%;
        height: 100%;
        border-radius: 34px;
        overflow: hidden;
        background: #fff;
        position: relative;
        min-height: 0;
      }

      .phone__screen iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }

      .caption {
        font-size: 0.8rem;
        color: #6b7280;
        margin-top: -8px;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="intro">
        <h1>BeatLingua</h1>
        <p>Language learning through music — interactive demo.</p>
      </header>

      <div class="phone-stage">
        <div class="phone" role="presentation">
          <div class="phone__screen">
            <!-- Replace YOUR_NETLIFY_URL with your deployed app URL (include https://) -->
            <iframe
              src="YOUR_NETLIFY_URL"
              title="BeatLingua app demo"
              loading="lazy"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            ></iframe>
          </div>
        </div>
      </div>

      <p class="caption">Set the iframe <code>src</code> below to your deployed app URL (e.g. Netlify).</p>
    </div>
  </body>
</html>
